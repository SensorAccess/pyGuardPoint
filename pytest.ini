[pytest]
# Pytest configuration for pyGuardPoint tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: integration tests that require live server
    async: async operation tests
    slow: slow tests
    destructive: tests that create/modify/delete data

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Timeout for tests (prevent hanging)
timeout = 30

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG
